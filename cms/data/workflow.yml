    website_url:
      label: "The same URL is provided for all the questions"
      check: "The application form has distinct URLs pointing to the correct information for all the answers that require a URL "
      instructions: "<p>If all URLs are identical but the required information is not actually available at that URL (e.g. all links point to the homepage), select 'non-compliant'.</p>
        <p>If the website is structured so that all required information is correctly available under a single URL, select 'The URLs provided are the same, but the website design justifies it'.</p>"
      answers:
        compliant: "Compliant. All required URLs in the application are distinct and point to the correct information."
        non_compliant: "Non-compliant. All URLs in the application are the same and do not point to the correct information."
        conditional: "Compliant, Same URL acceptable. All required information is correctly provided under a single URL due to the website structure."
        later: "Do this later"
      compliant_answers:
      - "compliant"
      non_compliant_answers:
      - "non_compliant"

    website_license_policy:
