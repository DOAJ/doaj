      check: "OA License policy is present and the same in all parts of the journal website, including the license page, submission page, instructions for authors, article abstracts, HTML pages, PDFs, website footer, and copyright forms."
      instructions: "<ul><li>If there is no licensing information or the licensing information in the website/articles is contradictory, the answer is 'No'</li>
        <li>If the licensing policy is stated in a different URL and not in the one provided, update the URL in the application form</li>
        <li>If the license stated in the application form is incorrect based on the information given in the website, update the licensing information in the application form accordingly</li>
        </ul>"
      edit:
        license: "License"
        license_attributes: "License attributes"
        license_url: "License URL"
      answers:
        compliant: "Compliant, OA License policy is present and consistent"
        non_compliant: "Non-compliant, OA License policy is either not provided on the journal's website or inconsistent "
        conditional: "Changes to OA License policy are required"
