    issn_at_least_one:
      label: "ISSN(s)"
      compliant: "Compliant, this journal has at least one ISSN"
      non_compliant: "Non-compliant, this record has no active and confrimed ISSNs"
      later: "I don't know - mark for later"
      action: "ISSN needs to be changed"
      check: "This journal has <strong>at least one</strong> ISSN (International Standard Serial Number) that is registered, active and confirmed at portal.issn.org"
      important: "Search <strong>both</strong> ISSNs (if available)"
      instructions: '<ul>
                  <li>If the journal has no active and confirmed ISSN (unregistered, provisional, unreported, ceased), the answer is <span class="answer noncompliant">Non-compliant</span></li>
                  <li>If any of the ISSNs is unregistered, provisional, unreported or listed as ceased, click <span class="answer action">Changes to ISSNs are required</span>, remove it, and add a note</li>
                  <li>If you cannot find the ISSN in the ISSN portal or the search result is a different journal, try to search the ISSN portal by the title or see if you can find the correct ISSN in the journal’s website. If this is the case, click <span class="answer action">Changes to ISSNs are required</span>, make the change, and add a note</li>
                  <li>If the application contains only one ISSN but there are two confirmed and active in the ISSN Portal, click <span class="answer action">Changes to ISSNs are required</span>, add the second ISSN, and add a note</li>
                  </ul>'
      resources:
        - label: "https://portal.issn.org/"
          url: "https://portal.issn.org/"
      eissn:
        label: "Electronic ISSN"
      pissn:
        label: "Print ISSN"
      compliant_answers:
      - "y"
      non_compliant_answers:
      - "n"

    issn_title:
      label: "Title in the application/website matches the title at ISSN portal"
      compliant: "<span class='answer'>Compliant</span>, this journal’s title in the application, on the website and at ISSN portal <strong>does</strong> match each other"
      non_compliant: "<span class='answer'>Non-compliant</span>, No, this journal’s name in the application or on the website <strong>does not</strong>  match the ISSN portal"
      later: "I don't know - mark for later"
      action: "Journal's title needs to be changed"
      check: "The journal's title in the application form and on the website match what is shown at issn.org"
      important: "If you need to edit the title always use the <strong>Online</strong> ISSN record (if available) "
      instructions: '<ul>
                  <li>If the title on the website matches the key-title or title proper at portal.issn.org but not the title provided in the application form, click <span class="answer action">Journal’s title needs to be changed</span>, provide the correct title and add a note </li>
                  <li>It is OK if there are some <strong>minor discrepancies</strong> between the title on the website and the one at portal.issn.org (e.g. a change from singular to plural of words, minor punctuation changes etc.)</li>
                  <li>For applications with the title in <strong>more than one language</strong>, we prefer to use as title the Key-title in original characters and as Alternative title the title in another language</li>
                  <li>For titles in Roman alphabet, change the Title and Alternative title to Title Case</li>
                  <li><strong>A subtitle is separated by a colon and one space</strong> (e.g. “Picenum Seraphicum: Rivista di Studi Storici e Francescani”). This differs from portal.issn.org where a full stop is used for subtitles and titles of parts /sections (full stop is acceptable for titles of parts /sections, e.g. “The Lancet Regional Health. Americas”). Publishers have the habit to add the subtitle in the Alternative title field. <strong>Please make sure to edit it so that the subtitle is always accompanied by the title</strong> (e.g. Siyar Journal: Social Issues by Academic Researchers)</li>
                  <li>Make sure to remove the Alternative title if it’s a duplicate entry</li>
                  <li>Never use Medline-style abbreviations</li>
                  <li>Sometimes publishers add the English version of the title in the Alternative title field even if the journal does not have an English website and the English title is not available in the ISSN portal record. The entry in the Alternative title field has to be present in the ISSN portal record or in the website. If not, you may remove the original entry in the Alternative title field</li>
                  </ul>'
      resources:
        - label: "https://portal.issn.org/"
          url: "https://portal.issn.org/"
      compliant_answers:
        - "y"
      non_compliant_answers:
        - "n"

    issn_continuation:
      label: "continuation"
      compliant: "No, it is <strong>not</strong> a continuation"
      non_compliant: ""
      later: "I don't know - mark for later"
      action: "Yes, this <strong>is</strong> a continuation"
      check: "Is this application for a continuation of existing journal?"
      important: "If the exclusion does not relate to all journals from a publisher, an application for another journal from that publisher should not be rejected at this stage"
      instructions: '<ul>
                  <li>If your search at ISSN portal returns <strong>3 or more journals</strong> then it is likely that the answer is <span class="answer compliant">Yes</span>.</li>
                  <li>Continuation status is often noted in the ISSN portal records of individual ISSNs so check for this as well, as <strong>a journal may be a continuation even if your search returns fewer than 3 journals</strong></li>
                  <li>Check for journal records/previous applications of the preceding journal in DOAJ. If the preceding journal is currently indexed in DOAJ, click <span class="answer action">There is a continuation</span> and add the ISSN(s) to the relevant field, <strong>do not add the continuation details to the preceding journal record</strong>.</li>
                  <li>If the <strong>preceding journal has a record in DOAJ, but is not currently indexed</strong>, make a note of it. If there are <strong>previous (rejected) applications from the preceding journal</strong>, make a note of them too</li>
                  <li>If the new ISSN(s) are not confirmed at portal.issn.org, inform the publisher via the Rejection message to submit a new application as soon as the ISSN is confirmed so that the continuation may be created</li>
                  </ul>'
      resources:
        - label: "https://portal.issn.org/"
          url: "https://portal.issn.org/"
        - label: "DOAJ admin journal search"
          url: "https://doaj.org/admin"
      compliant_answers:
        - "y"
      non_compliant_answers:
        - "n"

