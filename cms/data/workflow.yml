triage:
  fields:
    ethics_not_excluded:
      label: "Current exclusions"
      compliant: "Compliant, this application is from a journal or publisher that is not currently excluded."
      non_compliant: "Non-compliant, this application is from a journal or publisher that is currently excluded."
      check: "This application is from a journal or publisher that is not 
            currently excluded. (Note:  if an exclusion does not relate 
            to all journals from a publisher, an application for another 
            journal from that publisher should not be rejected at this 
            stage.)"
      instructions: 'If the exclusion does not relate to all journals from a publisher, an application for another journal from that publisher should not be rejected at this stage. Specifically:
            <ul><li>If there is a current publisher exclusion, the answer is "No"</li>
            <li>if there is a current journal exclusion for the journal we triage, the answer is "No"</li>
            <li>if there is a current journal exclusion for a different journal than the one we triage from the same publisher, the answer is "Yes"</li></ul>'
      resource_label: "Excluded publishers spreadsheet"
      resource_url: "https://docs.google.com/spreadsheets/d/17Ai-JMAabCrVIR3uhhtFXQZKLAwrK7jKd9DBnU7-GH8/edit?usp=sharing"

    ethics_no_nonstandard_metrics:
      label: "Non-standard metric services"
      compliant: "Compliant, this journal does not display references to non standard services"
      non_compliant: "Non-compliant, this journal displays references to non standard services"
      check: "The journal does not display any references  (images, links, logos) to non-standard 
            metric services"
      instructions: ""
      resource_label: "Quality Review Tool for Triage only"
      resource_url: "https://docs.google.com/spreadsheets/d/1IA_glTNaVbVq2EwFV7vJBZBUVn31GQJk-DvU-PJlRWA/edit?usp=sharing"

    ethics_no_fake_impact:
      label: "Fake impact factor values"
      compliant: "Compliant, this journal does not display fake impact factor values"
      non_compliant: "Non-compliant, this journal displays fake impact factor values"
      check: "The journal does not display fake impact factor values in texts or/and images"
      instructions: ""
      resource_label: "Quality Review Tool for Triage only"
      resource_url: "https://docs.google.com/spreadsheets/d/1IA_glTNaVbVq2EwFV7vJBZBUVn31GQJk-DvU-PJlRWA/edit?usp=sharing"

    ethics_no_false_doaj_claim:
      label: "False claim to be indexed in DOAJ"
      compliant: "Compliant, this journal does not make a false claim to be indexed in DOAJ"
      non_compliant: "Non-compliant, this journal makes a false claim to be indexed in DOAJ"
      check: "This journal does not make a false claim to be indexed in DOAJ"
      instructions: ""
      resource_label: "Quality Review Tool for Triage only"
      resource_url: "https://docs.google.com/spreadsheets/d/1IA_glTNaVbVq2EwFV7vJBZBUVn31GQJk-DvU-PJlRWA/edit?usp=sharing"

    ethics_no_suspicious_ties:
      label: "Previous exclusions/suspicious publisher or journals"
      compliant: "Compliant, this publisher/journal does not have links to any previously excluded or suspicious publisher/journal"
      non_compliant: "Non-compliant, this publisher/journal has links to previously excluded or suspicious publisher/journal"
      check: "The publisher/journal does not have links to 
          a) previously excluded publishers and 
          b) list of suspicious publishers (listed in the excluded publishers speadsheet)"
      instructions: "If the entry in the spreadsheet is marked that is no longer questionable after last review, 
                  the answer is No. Make a note of it and review the application as normal"
      resource_label: "Quality Review Tool for Triage only"
      resource_url: "https://docs.google.com/spreadsheets/d/1IA_glTNaVbVq2EwFV7vJBZBUVn31GQJk-DvU-PJlRWA/edit?usp=sharing"