    issn_at_least_one:
      label: "ISSN(s)"
      check: "This journal has at least one ISSN (International Standard Serial Number) that is registered, active and confirmed at issn.org?"
      instructions: '<ul><li>Search both ISSNs (if available)</li>
                  <li>If the journal has no active and confirmed ISSN (unregistered, provisional, unreported, ceased), the answer is "No"</li>
                  <li>If any of the ISSNs is unregistered, provisional, unreported or listed as ceased, click "Changes to ISSNs are required", remove it, and add a note</li>
                  <li>If you cannot find the ISSN in the ISSN portal or the search result is a different journal, try to search the ISSN portal by the Title or see if you can find the correct ISSN in the journal’s website. If this is the case, click "Changes to ISSNs are required", make the change, and add a note - don’t forget to search the correct ISSN in the DOAJ database</li>
                  <li>If the application contains only one ISSN but there are two confirmed and active in the ISSN Portal, click "Changes to ISSNs are required", add the second ISSN, and add a note - don’t forget to search the second ISSN in the DOAJ database</li>
                  <li><em>If the country at portal.issn.org does not match the Publisher''s country listed in the application form, make a note of it</em></li>'
      resource_label: "https://portal.issn.org/"
      resource_url: "https://portal.issn.org/"
      info:
        eissn: "Electronic ISSN"
        pissn: "Print ISSN"
      edit:
        eissn: "Electronic ISSN"
        pissn: "Print ISSN"
      answers:
        compliant: "Compliant, this journal has at least one ISSN"
        non_compliant: "Non-compliant, this record has no active and confrimed ISSNs"
        conditional: "Changes to ISSN are required"
        later: "Do this later"
      compliant_answers:
      - "compliant"
      - "conditional"
      non_compliant_answers:
      - "non_compliant"

    issn_title_match:
      label: "Title in the application/website matches the title at ISSN portal"
      check: "The journal's title and alternative title in the application form and on the website match what is shown at issn.org"
      instructions: '<ul><li>Always use the Online ISSN record (if available) to edit the Title in the application form</li>
                  <li>If the title on the website matches the key-title or Title proper at portal.issn.org but not the Title provided in the application form, correct the Title in the application form and add a note</li>
                  <li>It is OK if there are some minor discrepancies between the title on the website and the one at portal.issn.org (e.g. a change from singular to plural of words, minor punctuation changes etc.)</li>
                  <li>For applications with the title in more than one language, we prefer to use as Title the Key-title in original characters and as Alternative title the title in another language</li>
                  <li>For titles in Roman alphabet, change the Title and Alternative title to Title Case</li>
                  <li>A subtitle is separated by a colon and one space (e.g. “Picenum Seraphicum: Rivista di Studi Storici e Francescani”). This differs from portal.issn.org where a full stop is used for subtitles and titles of parts /sections (full stop is acceptable for titles of parts /sections, e.g. “The Lancet Regional Health. Americas”). Publishers have the habit to add the subtitle in the Alternative title field. Please make sure to edit it so that the subtitle is always accompanied by the Title (e.g. Siyar Journal: Social Issues by Academic Researchers)</li>
                  <li>Make sure to remove the Alternative title if it’s a duplicate entry</li>
                  <li>Never use Medline-style abbreviations</li>
                  <li>Sometimes publishers add the English version of the title in the Alternative title field even if the journal does not have an English website and the English title is not available in the ISSN portal record. The entry in the Alternative title field has to be present in the ISSN portal record or in the website. If not, you may remove the original entry in the Alternative title field</li></ul>'
      resource_label: "https://portal.issn.org/"
      resource_url: "https://portal.issn.org/"
      edit:
        title: "Title"
      answers:
        compliant: "Compliant, this journal’s names in the application, on the website and at issn.org match"
        non_compliant: "Non-compliant, this journal’s name in the application or on the website does not match the ISSN portal"
        conditional: "Journal’s title needs to be changed"
        later: "Do this later"
      compliant_answers:
      - "compliant"
      - "conditional"
      non_compliant_answers:
      - "non_compliant"

    issn_continuation:
      label: "Continuation"
      check: "Is this application for a continuation of existing journal?"
      instructions: '<ul><li>If your search at ISSN portal returns 3 or more journals then it is likely that the answer is Yes. Continuation status is often noted in the ISSN portal records of individual ISSNs so check for this as well, as a journal may be a continuation even if your search returns fewer than 3 journals</li>
                  <li>Check for journal records/previous applications of the preceding journal in DOAJ. If the preceding journal is currently indexed in DOAJ, add the ISSN(s) to the correct field in the continuation box of the new application - do not add the continuation details to the preceding journal record.</li>
                  <li>If the preceding journal has a record in DOAJ, but is not currently indexed, make a note of it in the new application. If there are previous (rejected) applications from the preceding journal, make a note of them too</li>
                  <li><em>If the previous title is currently indexed in DOAJ and the application for the new title does not comply with the triage criteria in the Website and Journal Content sections, then in this case DO NOT reject it, but make notes of them for the Managing Editor in order to decide if the new title meets the criteria for inclusion or the new application must be rejected and the previous title record must be removed</em></li>
                  </ul>'
      resource_label: "https://portal.issn.org/"
      resource_url: "https://portal.issn.org/"
      edit:
        continues: "Continues"
      answers:
        compliant: "Yes"
        conditional: "No"
        later: "Do this later"
      compliant_answers:
      - "compliant"
      non_compliant_answers:
      - "conditional"

    website_working:
      label: "Working journal website"
      check: "This journal has a working website"
      instructions: '<ul><li>Open the homepage URL and make sure it is working. If not, check it again later and if it is still not working, the answer is "No" (you can double check at https://downforeveryoneorjustme.com/)</li>
                  <li>Make sure that at least one ISSN is displayed on the website and that it is correct. If not, make a note</li>
