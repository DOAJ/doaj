<script type="text/javascript" src="/static/js/dontleave.js"></script>

<script type="text/javascript">
    jQuery(document).ready(function($) {
        // Populate select2 role picker (multiple select)
        // Use JSON serialization for the available tags to avoid quoting issues
        var roleTags = {{ current_user.all_top_level_roles()|tojson }};
        $('#roles').select2({
            tags: roleTags,
            tokenSeparators: [',', ';'],
            placeholder: 'Select or type roles',
            width: '100%',
            closeOnSelect: false, // keep dropdown open for multiple selection
            allowClear: true
        });

        var $attrWf = $("#attribute_workflow");
        $attrWf.select2({
            placeholder: 'Select workflow stages',
            width: '100%',
            allowClear: true,
            closeOnSelect: $attrWf.prop('multiple') ? false : true
        });

        // Initialise select2 for language field. If the underlying select is multiple,
        // keep the dropdown open on select (closeOnSelect = false).
        var $attrLang = $("#attribute_language");
        $attrLang.select2({
            placeholder: 'Select language',
            width: '100%',
            allowClear: true,
            closeOnSelect: $attrLang.prop('multiple') ? false : true
        });

        let $attrCountry = $("#attribute_country");
        $attrCountry.select2({
            placeholder: 'Select country',
            width: '100%',
            allowClear: true,
            closeOnSelect: $attrCountry.prop('multiple') ? false : true
        })

        let $otherAttr = $("#attribute_tag");
        // Turn a simple text field into a free-text tag entry box.
        // Use comma as the token separator so users can enter tags separated by commas.
        $otherAttr.select2({
            tags: true,
            tokenSeparators: [','],
            placeholder: 'Add tags',
            width: '100%',
            allowClear: true,
            closeOnSelect: true,
            // Remove the built-in "Searching..." message/spinner since there is
            // no remote data source — return an empty string for the searching
            // message so the spinner text is not shown.
            language: {
                searching: function() { return ''; }
            },
            // Ensure markup isn't escaped so empty searching messages don't show markup
            escapeMarkup: function (markup) { return markup; },
            // Normalize entered tags by trimming whitespace and preventing empty tags
            createTag: function (params) {
                var term = $.trim(params.term);
                if (term === '') {
                    return null;
                }
                return { id: term, text: term };
            }
        });

        // Scroll to errors
        let firstError = $('.errors')[0];
        if (firstError) {
            $(window).scrollTop($(firstError).offset().top - 100)
        }

        {% if account.has_role("api") %}
            // Copy API key to clipboard
            $('#click-to-copy--api').click(function() {
                let value_to_copy = $('#user-api').html();
                navigator.clipboard.writeText(value_to_copy);
                var confirmation = $("#copy-confirmation--api");
                confirmation.text("Copied: " + value_to_copy);
                confirmation.show().delay(3000).fadeOut();
            });
        {% endif %}

        // If the user is editing their own account, make them confirm when email address is updated
        {% if current_user.id == account.id %}
            $('form#edit_user').submit(function () {
                if ($('input#email_confirm').val() !== "") {
                    return confirm('Are you sure you want to change email address?\nYou will be logged out and will need to verify your account again to continue.');
                }
            });
        {% endif %}

        {# ~~->DontLeave:Feature~~ #}
        // initialise the leave with unsaved changed warning
        doaj.dontleave.init({containerSelector: "#edit_user"});
    });
</script>
