<form id="{{ form.ref.struct_ref.name }}"
      novalidate
      action="{{ url_for('admin.triage', triage_id=triage_id) }}"
      method="{{ form.ref.method }}"
      data-parsley-focus="none">

    <div class="col-md-12 page">
        <section class="page-content">
            {% for element in form.elements %}
                {% set rend = element.ref.get_renderer() %}
                {% autoescape off %}
                    {{ rend.draw(element) }}
                {% endautoescape %}
            {% endfor %}
            <button id="submitBtn" class="button button--cta" type="submit">Save</button>
        </section>
    </div>
</form>
