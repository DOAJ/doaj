<form id="{{ form.name }}"
      novalidate
      action="{{ url_for('workflow.triage_form', application_id=application.id) }}"
      method="{{ form.method }}"
      data-parsley-focus="none"
        {% for k, v in form.attributes %}{{ k }}="{{ v }}" {% endfor %}
    >

    <div class="error-container">
    {% if form.errors %}
        Form Errors
        {% for error in form.errors %}
            <div class="error" style="color: red; font-weight: bold;">
                {{ form.error_message(error) }}
            </div>
        {% endfor %}
    {% endif %}
    </div>

    <div class="col-md-12 page">
        <section class="page-content">
            {% for element in form.elements %}
                {% autoescape off %}
                    {{ element.renderer.draw(element, application=application, wfc=wfc) }}
                {% endautoescape %}
            {% endfor %}
            <button id="submitBtn" class="button button--cta" type="submit">Save</button>
        </section>
    </div>
</form>
