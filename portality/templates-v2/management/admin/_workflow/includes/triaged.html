<form action="{{ event.get_route() }}" method="post" style="margin-bottom: 0">
    {% if onward %}
        <input type="hidden" name="onward" value="{{ onward }}">
    {% endif %}
    <select name="send_to" id="send_to">
        <option value="">Assign to...</option>
        <option name="maned">A Managing Editor</option>
        <option name="group">An Editor Group</option>
        <option name="quality_review">Quality Review</option>
    </select>
    <button class="assign" style="margin: 0 0 0 0">Complete Triage</button>
</form>
