<form action="{{ event.get_route() }}" method="post" style="margin-bottom: 0">
    <input type="hidden" name="workflow_control" value="{{ wfc.id }}">
    {% if onward %}
        <input type="hidden" name="onward" value="{{ onward }}">
    {% endif %}
    <input type="text" name="note" placeholder="Note">
    <input type="date" name="embargo_end" placeholder="Embargo End Date">
    <button type="submit" style="margin: 0 0 0 0">Fail</button>
</form>
